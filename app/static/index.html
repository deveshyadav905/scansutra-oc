<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ScanSutra OCR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        .progress-wrap { display: none; margin-top: 18px; text-align: left; }
        .progress-label { font-size: 13px; color: #555; margin-bottom: 6px; }
        .progress-bar-bg { background: #e9ecef; border-radius: 6px; height: 12px; overflow: hidden; }
        .progress-bar-fill {
            height: 100%; width: 0%; background: #007bff;
            border-radius: 6px; transition: width 0.4s ease;
        }
        .status-badge {
            display: inline-block; margin-top: 12px;
            padding: 5px 14px; border-radius: 20px;
            font-size: 13px; font-weight: bold;
        }
        .badge-queued     { background: #fff3cd; color: #856404; }
        .badge-processing { background: #cfe2ff; color: #084298; }
        .badge-done       { background: #d1e7dd; color: #0f5132; }
        .badge-failed     { background: #f8d7da; color: #842029; }

        #actionSection { display: none; margin-top: 15px; }
        #actionSection a { text-decoration: none; }
        #pdfPreview { display: none; margin-top: 20px; }
        iframe { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 6px; }
        .result { margin-top: 16px; padding: 10px; font-size: 14px; border-radius: 5px; }
        footer { margin-top: 40px; font-size: 13px; color: #888; }
        footer a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 ScanSutra OCR</h1>
    <p>Upload PDF → Get Searchable PDF</p>

    <input type="file" id="pdfFile" accept="application/pdf">
    <select id="language">
        <option value="eng">English</option>
        <option value="hin">Hindi</option>
        <option value="hin+eng">Hindi + English</option>
    </select>
    <button id="processBtn" onclick="uploadPDF()">Process PDF</button>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">Uploading...</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span class="status-badge badge-queued" id="statusBadge">Queued</span>
    </div>

    <div id="actionSection">
        <a id="downloadLink" download="searchable_output.pdf">
            <button>⬇ Download Searchable PDF</button>
        </a>
        <button onclick="previewPDF()">👁 Preview PDF</button>
        <button onclick="resetUI()" style="background:#6c757d; margin-top:6px;">🔄 Process Another</button>
    </div>

    <div id="pdfPreview">
        <iframe id="pdfFrame"></iframe>
    </div>

    <div class="result" id="textOutput"></div>
</div>

<footer>
    &copy; 2025 <a href="https://github.com/dev-tech" target="_blank">@dev-tech</a>. All rights reserved.
</footer>

<script>
const SESSION_KEY = "scansutra_job_id";  // sessionStorage key

let generatedPDFUrl = null;
let currentJobId    = null;
let pollInterval    = null;
const POLL_MS       = 2500;

const STEPS = {
    upload:     { label: "Uploading file...",      pct: 10,  badge: "queued",     text: "Uploading"   },
    queued:     { label: "Job queued...",          pct: 20,  badge: "queued",     text: "Queued"      },
    processing: { label: "Running OCR...",         pct: 60,  badge: "processing", text: "Processing"  },
    merging:    { label: "Merging pages...",       pct: 85,  badge: "processing", text: "Merging"     },
    done:       { label: "Done! ✅",              pct: 100, badge: "done",       text: "Complete"    },
    failed:     { label: "Failed ❌",              pct: 100, badge: "failed",     text: "Failed"      },
};

// ── Progress UI ────────────────────────────────────────────────────────────────
function setProgress(state, extraLabel = "") {
    const s = STEPS[state];
    if (!s) return;
    document.getElementById("progressFill").style.width  = s.pct + "%";
    document.getElementById("progressLabel").textContent = extraLabel || s.label;
    const badge = document.getElementById("statusBadge");
    badge.className   = `status-badge badge-${s.badge}`;
    badge.textContent = s.text;
}

// ── Session persistence ────────────────────────────────────────────────────────
function saveSession(jobId) {
    sessionStorage.setItem(SESSION_KEY, jobId);
}

function loadSession() {
    return sessionStorage.getItem(SESSION_KEY);
}

function clearSession() {
    sessionStorage.removeItem(SESSION_KEY);
}

// ── Cancel job on server ───────────────────────────────────────────────────────
function cancelJobOnServer(jobId) {
    if (!jobId) return;
    // sendBeacon fires reliably even during page unload
    navigator.sendBeacon(`/api/job/${jobId}/cancel`);
}

// ── Reset UI ───────────────────────────────────────────────────────────────────
function resetUI() {
    stopPolling();

    // ✅ Cancel the server job before clearing session
    const savedId = currentJobId || loadSession();
    if (savedId) {
        cancelJobOnServer(savedId);
    }

    currentJobId = null;
    clearSession();

    document.getElementById("pdfFile").value                 = "";
    document.getElementById("progressWrap").style.display    = "none";
    document.getElementById("actionSection").style.display   = "none";
    document.getElementById("pdfPreview").style.display      = "none";
    document.getElementById("textOutput").innerHTML          = "";
    document.getElementById("pdfFrame").src                  = "";
    document.getElementById("downloadLink").href             = "#";
    document.getElementById("processBtn").disabled           = false;
    document.getElementById("progressFill").style.width      = "0%";

    if (generatedPDFUrl) {
        URL.revokeObjectURL(generatedPDFUrl);
        generatedPDFUrl = null;
    }
}

// ── On page load — resume or cancel orphaned job ───────────────────────────────
window.addEventListener("load", () => {
    const savedJobId = loadSession();

    if (savedJobId) {
        // ✅ Page was refreshed — resume polling instead of leaving job orphaned
        currentJobId = savedJobId;

        document.getElementById("processBtn").disabled        = true;
        document.getElementById("progressWrap").style.display = "block";
        setProgress("processing", "Resuming previous job...");

        // Check if it's still alive
        fetch(`/api/status/${savedJobId}`)
            .then(r => r.json())
            .then(data => {
                if (data.status === "done") {
                    // Already finished while page was reloading
                    stopPolling();
                    setProgress("done");
                    fetchResult();
                } else if (data.status === "failed") {
                    showError(data.error || "Job failed.");
                    clearSession();
                } else if (data.status === "queued" || data.status === "processing") {
                    // Still running — resume polling
                    startPolling();
                } else {
                    // Unknown/cancelled — clean up
                    cancelJobOnServer(savedJobId);
                    clearSession();
                    resetUI();
                }
            })
            .catch(() => {
                // Server unreachable — clean up locally
                clearSession();
                resetUI();
            });
    }
});

// ── On tab close / hard refresh (Ctrl+Shift+R) ────────────────────────────────
window.addEventListener("beforeunload", () => {
    const jobId = currentJobId || loadSession();
    if (!jobId) return;

    // Check if job is still in progress — if so cancel it
    // We can't do async here so we use sendBeacon for the DELETE call
    // sendBeacon uses POST — our cancel endpoint is DELETE
    // Workaround: hit a dedicated POST cancel endpoint
    navigator.sendBeacon(`/api/job/${jobId}/cancel`);
});

// ── Upload ─────────────────────────────────────────────────────────────────────
async function uploadPDF() {
    const fileInput = document.getElementById("pdfFile");
    const lang      = document.getElementById("language").value;

    if (!fileInput.files.length) { alert("Please select a PDF file."); return; }
    if (!fileInput.files[0].name.toLowerCase().endsWith(".pdf")) {
        alert("Only PDF files are supported."); return;
    }

    // ✅ Cancel any previous orphaned job before starting new one
    const oldJobId = loadSession();
    if (oldJobId) cancelJobOnServer(oldJobId);
    clearSession();

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("lang", lang);

    document.getElementById("processBtn").disabled        = true;
    document.getElementById("progressWrap").style.display = "block";
    document.getElementById("actionSection").style.display = "none";
    document.getElementById("textOutput").innerHTML        = "";
    setProgress("upload");

    try {
        const res = await fetch("/api/ocr/", { method: "POST", body: formData });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `Server error ${res.status}`);
        }
        const data = await res.json();
        currentJobId = data.job_id;

        // ✅ Save to sessionStorage immediately — survives refresh
        saveSession(currentJobId);

        setProgress("queued");
        startPolling();

    } catch (err) {
        showError(err.message);
    }
}

// ── Polling ────────────────────────────────────────────────────────────────────
function startPolling() {
    stopPolling();
    pollInterval = setInterval(pollStatus, POLL_MS);
}

function stopPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

async function pollStatus() {
    if (!currentJobId) return;
    try {
        const res  = await fetch(`/api/status/${currentJobId}`);
        if (!res.ok) throw new Error(`Status check failed: ${res.status}`);
        const data = await res.json();

        if (data.status === "queued") {
            setProgress("queued");
        } else if (data.status === "processing") {
            const step = (data.step || "").toLowerCase();
            setProgress(step.includes("merg") ? "merging" : "processing", data.step);
        } else if (data.status === "done") {
            stopPolling();
            setProgress("done");
            await fetchResult();
        } else if (data.status === "failed") {
            stopPolling();
            clearSession();
            showError(data.error || "OCR processing failed.");
        }
    } catch (err) {
        stopPolling();
        showError("Lost connection to server.");
    }
}

// ── Fetch result ───────────────────────────────────────────────────────────────
async function fetchResult() {
    try {
        const res = await fetch(`/api/result/${currentJobId}`);
        if (!res.ok) throw new Error("Could not retrieve result.");
        const blob = await res.blob();

        if (generatedPDFUrl) URL.revokeObjectURL(generatedPDFUrl);
        generatedPDFUrl = URL.createObjectURL(blob);

        document.getElementById("downloadLink").href           = generatedPDFUrl;
        document.getElementById("actionSection").style.display = "block";
        document.getElementById("textOutput").innerHTML        = "✅ OCR completed successfully!";
        document.getElementById("processBtn").disabled         = false;

        // ✅ Job done and downloaded — clear session
        clearSession();
        currentJobId = null;

    } catch (err) {
        showError(err.message);
    }
}

// ── Preview ────────────────────────────────────────────────────────────────────
function previewPDF() {
    if (!generatedPDFUrl) return;
    document.getElementById("pdfFrame").src             = generatedPDFUrl;
    document.getElementById("pdfPreview").style.display = "block";
}

// ── Error ──────────────────────────────────────────────────────────────────────
function showError(msg) {
    stopPolling();
    setProgress("failed");
    document.getElementById("textOutput").innerHTML = `❌ Error: ${msg}`;
    document.getElementById("processBtn").disabled  = false;
    clearSession();
    currentJobId = null;
}
</script>
</body>
</html>
